name: Mobile Build

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "shared/**"
  pull_request:
    branches: [main]
    paths:
      - "mobile/**"
      - "shared/**"

jobs:
  mobile-ci:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd mobile && npm install

      - name: Lint
        run: cd mobile && npm run lint

      - name: Type check
        run: cd mobile && npm run type-check

      - name: Run tests
        run: cd mobile && npm run test -- --passWithNoTests

  android-prebuild-check:
    name: Android Prebuild Check
    runs-on: ubuntu-latest
    needs: mobile-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: cd mobile && npm install

      - name: Expo prebuild (Android)
        run: cd mobile && npx expo prebuild --platform android --no-install

      - name: Verify Android project generated
        run: |
          if [ ! -d "mobile/android" ]; then
            echo "ERROR: Android prebuild failed - no android/ directory generated"
            exit 1
          fi
          echo "Android prebuild successful"

  apk-size-check:
    name: APK Size Budget Check
    runs-on: ubuntu-latest
    needs: mobile-ci
    # This job runs a placeholder check. Full APK builds happen via EAS.
    # When EAS builds are available, replace this with actual APK size inspection.

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check bundle size budget
        run: |
          MAX_SIZE_MB=50
          echo "APK size budget: ${MAX_SIZE_MB}MB"
          echo ""
          echo "NOTE: Full APK size check requires EAS Build."
          echo "This step validates that the JS bundle + assets stay within budget."
          echo ""

          # Check total size of mobile assets (images, fonts, sounds)
          if [ -d "mobile/assets" ]; then
            ASSETS_SIZE_KB=$(du -sk mobile/assets | cut -f1)
            ASSETS_SIZE_MB=$((ASSETS_SIZE_KB / 1024))
            echo "Assets directory size: ${ASSETS_SIZE_MB}MB"

            # Assets alone should not exceed 30MB (leaves room for JS bundle + native code)
            if [ "$ASSETS_SIZE_MB" -gt 30 ]; then
              echo "ERROR: Assets exceed 30MB budget (${ASSETS_SIZE_MB}MB). Move large assets to CDN."
              exit 1
            fi
          else
            echo "No assets directory found - OK"
          fi

          echo ""
          echo "APK size check: PASSED (within budget)"
