# ============================================
# Questcast - Docker Compose (Local Development)
# ============================================
# Usage: docker compose up -d
# Logs:  docker compose logs -f backend

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: builder
    container_name: questcast_backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://questcast:questcast_dev@postgres:5432/questcast
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=local-dev-jwt-secret-that-is-at-least-32-characters-long
      - OPENAI_API_KEY=${OPENAI_API_KEY:-sk-replace-me}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
      - CORS_ORIGIN=*
      - SENTRY_DSN=
    working_dir: /app/backend
    volumes:
      - ./backend/src:/app/backend/src:ro
      - ./shared:/app/shared:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - questcast-net
    restart: unless-stopped
    # Override CMD for development (hot reload with tsx)
    command: ["npx", "tsx", "watch", "src/index.ts"]

  postgres:
    image: postgres:16-alpine
    container_name: questcast_postgres
    environment:
      - POSTGRES_DB=questcast
      - POSTGRES_USER=questcast
      - POSTGRES_PASSWORD=questcast_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - questcast-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U questcast -d questcast"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: questcast_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - questcast-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  questcast-net:
    driver: bridge
